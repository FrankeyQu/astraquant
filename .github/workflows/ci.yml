name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  go-core:
    name: Go core tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Test core packages
        run: go test ./pkg/executor ./pkg/manager ./pkg/exchange/sim

      - name: Compile persistence packages
        run: go test ./internal/model ./internal/persistence/engine ./internal/persistence/market ./pkg/repo
