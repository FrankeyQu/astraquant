name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run lightweight secret scan
        shell: pwsh
        run: .github/scripts/secret-scan.ps1

  devex-checks:
    name: DevEx checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Makefile targets
        run: make -n build test docker-up docker-down docker-ps

      - name: Validate Docker Compose config
        run: docker compose -f docker-compose.yml config

  web-quality:
    name: Web lint and build
    runs-on: ubuntu-latest
    needs:
      - secret-scan
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

  go-core:
    name: Go full test suite
    runs-on: ubuntu-latest
    needs:
      - secret-scan
    defaults:
      run:
        working-directory: go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run full CI-safe test suite
        run: make test-ci
