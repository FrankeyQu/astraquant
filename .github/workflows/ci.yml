name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run lightweight secret scan
        shell: pwsh
        run: .github/scripts/secret-scan.ps1

  devex-checks:
    name: DevEx checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Makefile targets
        run: make -n build test docker-up docker-down docker-ps

      - name: Validate Docker Compose config
        run: docker compose -f docker-compose.yml config

  go-core:
    name: Go core tests
    runs-on: ubuntu-latest
    needs:
      - secret-scan
    defaults:
      run:
        working-directory: go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Test core packages
        run: go test ./pkg/executor ./pkg/manager ./pkg/exchange/sim

      - name: Compile persistence packages
        run: go test ./internal/model ./internal/persistence/engine ./internal/persistence/market ./pkg/repo
