# Example exchange provider configuration.
default: hyperliquid_testnet
providers:
  hyperliquid_testnet:
    type: hyperliquid
    # Secrets are resolved by SecretStore at provider construction time.
    # Lookup key: trader_id/session_id/provider/private_key.
    # Local env fallback: ASTRAQUANT_HYPERLIQUID_PRIVATE_KEY, then HYPERLIQUID_PRIVATE_KEY.
    credentials:
      trader_id: ${ASTRAQUANT_TRADER_ID}
      session_id: ${ASTRAQUANT_SESSION_ID}
      provider: hyperliquid
    # Main account address for info requests (only needed when using API wallet).
    main_address: ${HYPERLIQUID_MAIN_ADDRESS}
    # true to route requests to Hyperliquid testnet endpoints.
    testnet: true
    # Optional request timeout override for exchange HTTP client.
    timeout: 30s
    # Optional vault address for delegated signing.
    vault_address: ${HYPERLIQUID_VAULT_ADDRESS}

  paper_trading:
    type: sim
    # In-memory simulator used for paper trading flows.
